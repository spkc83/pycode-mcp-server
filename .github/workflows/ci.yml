name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
      fail-fast: false
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Validate CI Python matrix against pyproject
        run: |
          python - <<'PY'
          import re
          import sys
          from pathlib import Path

          pyproject_lines = Path("pyproject.toml").read_text(encoding="utf-8").splitlines()
          in_project_section = False
          requires_python = None

          for raw_line in pyproject_lines:
              line = raw_line.strip()
              if not line or line.startswith("#"):
                  continue
              if line.startswith("[") and line.endswith("]"):
                  in_project_section = line == "[project]"
                  continue
              if not in_project_section:
                  continue
              match = re.match(r"requires-python\s*=\s*(['\"])(.*?)\1$", line)
              if match:
                  requires_python = match.group(2).strip()
                  break

          if not requires_python:
              print("Could not find project.requires-python in pyproject.toml", file=sys.stderr)
              sys.exit(1)

          min_match = re.search(r">=\s*(\d+)\.(\d+)", requires_python)
          if not min_match:
              print(f"Unsupported requires-python format: {requires_python}", file=sys.stderr)
              sys.exit(1)

          min_version = (int(min_match.group(1)), int(min_match.group(2)))
          workflow_text = Path(".github/workflows/ci.yml").read_text(encoding="utf-8")
          matrix_match = re.search(r"python-version:\s*\[([^\]]+)\]", workflow_text)
          if not matrix_match:
              print("Could not find python-version matrix in .github/workflows/ci.yml", file=sys.stderr)
              sys.exit(1)

          version_strings = re.findall(r"\d+\.\d+", matrix_match.group(1))
          if not version_strings:
              print("No Python versions found in workflow matrix", file=sys.stderr)
              sys.exit(1)

          bad_versions = []
          for version in version_strings:
              parsed = tuple(int(part) for part in version.split("."))
              if parsed < min_version:
                  bad_versions.append(version)

          if bad_versions:
              print(
                  "CI matrix contains unsupported Python versions: "
                  + ", ".join(sorted(set(bad_versions)))
                  + f" (requires-python is {requires_python})",
                  file=sys.stderr,
              )
              sys.exit(1)

          print(
              "CI matrix Python versions are compatible with requires-python "
              + requires_python
              + ": "
              + ", ".join(version_strings)
          )
          PY

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check scripts/ tests/

      - name: Format check with ruff
        run: ruff format --check scripts/ tests/

      - name: Run health check
        run: python scripts/health_check.py

      - name: Run environment inspection
        run: python scripts/inspect_env.py --no-cache | head -20

      - name: Run tests
        run: pytest -v

      - name: Test doc_lookup
        run: python scripts/doc_lookup.py str --no-cache | head -10

      - name: Test code_analyzer
        run: python scripts/code_analyzer.py scripts/inspect_env.py | head -20

      - name: Test jedi_engine status
        run: python scripts/jedi_engine.py status

      - name: Test project_analyzer
        run: python scripts/project_analyzer.py scripts/ | head -30

      - name: Test diagnostics
        run: python scripts/diagnostics.py scripts/cache.py | head -20

      - name: Run benchmark smoke test
        run: python scripts/benchmark.py --suite doc_lookup --iterations 3 --format table
        continue-on-error: true

      - name: Run token estimator
        run: python scripts/token_estimator.py --compare doc_lookup json.dumps --format json | head -30
        continue-on-error: true
